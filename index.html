<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dylphiiee · V1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:ital,wght@0,300;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#mc{position:fixed;inset:0;z-index:1}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:22px 26px 18px}
#topbar{display:flex;justify-content:space-between;align-items:flex-start}
#logo{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:.12em;color:rgba(255,255,255,.85);line-height:1}
#logo-sub{font-family:'DM Mono',monospace;font-size:7.5px;font-style:italic;letter-spacing:.22em;color:rgba(255,255,255,.22);text-transform:uppercase;margin-top:3px}
#chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:4px 12px 4px 8px}
#cdot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
#ctxt{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.18em;color:rgba(255,255,255,.32);text-transform:uppercase}
#bottombar{display:flex;align-items:flex-end;justify-content:flex-end}
#cw{width:148px;height:110px;border-radius:10px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.7)}
#vid{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);filter:brightness(.75)}
#hc{position:absolute;inset:0;width:100%;height:100%;z-index:2}
#cb{position:absolute;top:6px;left:7px;z-index:4;display:flex;align-items:center;gap:3px}
#cld{width:4px;height:4px;border-radius:50%;background:#ef4444;animation:pd 1.2s infinite;box-shadow:0 0 5px #ef4444}
#clt{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.14em;color:rgba(255,255,255,.38);text-transform:uppercase}
#ctl{position:fixed;top:0;left:0;width:48px;height:48px;border-top:1px solid rgba(255,255,255,.07);border-left:1px solid rgba(255,255,255,.07);z-index:9;pointer-events:none}
#cbr{position:fixed;bottom:0;right:0;width:48px;height:48px;border-bottom:1px solid rgba(255,255,255,.07);border-right:1px solid rgba(255,255,255,.07);z-index:9;pointer-events:none}
#ticker{position:fixed;bottom:0;left:0;right:0;height:24px;z-index:8;overflow:hidden;border-top:1px solid rgba(255,255,255,.04);pointer-events:none}
#ti{display:flex;height:100%;align-items:center;white-space:nowrap;animation:tick 32s linear infinite}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.09);text-transform:uppercase;padding:0 24px}
.ts{color:rgba(255,255,255,.04)}
</style>
</head>
<body>
<canvas id="mc"></canvas>
<div id="ctl"></div><div id="cbr"></div>
<div id="ui">
  <div id="topbar">
    <div><div id="logo">Dylphiiee</div><div id="logo-sub">Particle Interface · V1</div></div>
    <div id="chip"><div id="cdot"></div><div id="ctxt">Ready</div></div>
  </div>
  <div id="bottombar">
    <div id="cw">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="hc"></canvas>
      <div id="cb"><div id="cld"></div><div id="clt">live</div></div>
    </div>
  </div>
</div>
<div id="ticker"><div id="ti">
  <span class="ti">Dylphiiee</span><span class="ts">·</span>
  <span class="ti">Particle Interface</span><span class="ts">·</span>
  <span class="ti">Software Engineering</span><span class="ts">·</span>
  <span class="ti">MediaPipe Hands</span><span class="ts">·</span>
  <span class="ti">Interactive Art</span><span class="ts">·</span>
  <span class="ti">Dylphiiee</span><span class="ts">·</span>
  <span class="ti">Particle Interface</span><span class="ts">·</span>
  <span class="ti">Software Engineering</span><span class="ts">·</span>
  <span class="ti">MediaPipe Hands</span><span class="ts">·</span>
  <span class="ti">Interactive Art</span><span class="ts">·</span>
</div></div>

<script>
// ════════════════════════════════════
// CANVAS SETUP
// ════════════════════════════════════
const mc  = document.getElementById('mc');
const ctx = mc.getContext('2d');
function W(){ return window.innerWidth; }
function H(){ return window.innerHeight; }
mc.width = W(); mc.height = H();

// ════════════════════════════════════
// PALETTES  rgb 0-255
// ════════════════════════════════════
const PAL = {
  idle:  ['#0d1f3c','#142850','#0a1628','#1a2f5a','#0f1e40'],
  open:  ['#fbbf24','#f59e0b','#fde68a','#f97316','#fcd34d'],
  index: ['#38bdf8','#0ea5e9','#7dd3fc','#0284c7','#bae6fd'],
  fist:  ['#4ade80','#22c55e','#86efac','#16a34a','#bbf7d0'],
  side:  ['#c084fc','#a855f7','#e9d5ff','#7c3aed','#ddd6fe'],
  peace: null,
  gun:   ['#fb923c','#ef4444','#fcd34d','#f97316','#fee2e2'],
};

// ════════════════════════════════════
// PARTICLES
// ════════════════════════════════════
const N = 2600;

class P {
  constructor(i) {
    this.i = i;
    this.reset();
    this.x = Math.random() * W();
    this.y = Math.random() * H();
    this.life = Math.random() * Math.PI * 2;
  }
  reset() {
    this.x  = Math.random() * W();
    this.y  = Math.random() * H();
    this.tx = this.x; this.ty = this.y;
    this.vx = 0; this.vy = 0;
    this.r  = 0.5 + Math.random() * 0.8;
    this.baseR = this.r;
    this.color = '#0d1f3c';
    this.dx = (Math.random()-.5)*.2;
    this.dy = (Math.random()-.5)*.2;
    this.life = Math.random() * Math.PI * 2;
  }
  update(spd, mode) {
    this.life += 0.012;
    if (mode === 'idle') {
      this.tx += this.dx + Math.sin(this.life + this.i*.002)*.06;
      this.ty += this.dy + Math.cos(this.life*.7 + this.i*.003)*.06;
      if (this.tx < 0 || this.tx > W()) this.dx *= -1;
      if (this.ty < 0 || this.ty > H()) this.dy *= -1;
    }
    const ex = this.tx - this.x;
    const ey = this.ty - this.y;
    this.vx = (this.vx + ex * spd) * 0.68;
    this.vy = (this.vy + ey * spd) * 0.68;
    this.x += this.vx;
    this.y += this.vy;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

const particles = Array.from({length:N}, (_,i) => new P(i));

// ════════════════════════════════════
// FLOATING AMBIENT PARTICLES
// small extras that drift near shape
// ════════════════════════════════════
const ANOISE = 180;
const ambient = Array.from({length:ANOISE}, (_,i) => ({
  x: Math.random()*W(), y: Math.random()*H(),
  vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
  r: 0.3 + Math.random()*.5,
  color:'#1a3a6e', life: Math.random()*Math.PI*2,
  i
}));

function updateAmbient(mode) {
  const pal = PAL[mode] || PAL.idle;
  for (const a of ambient) {
    a.life += 0.015;
    a.x += a.vx + Math.sin(a.life + a.i*.08)*.08;
    a.y += a.vy + Math.cos(a.life*.6 + a.i*.07)*.08;
    if (a.x < -20) a.x = W()+10;
    if (a.x > W()+20) a.x = -10;
    if (a.y < -20) a.y = H()+10;
    if (a.y > H()+20) a.y = -10;
    if (mode !== 'idle') {
      a.color = pal[a.i % pal.length];
    } else {
      a.color = '#1e3a5f';
    }
    ctx.globalAlpha = 0.18 + Math.sin(a.life)*0.08;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
    ctx.fillStyle = a.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ════════════════════════════════════
// TEXT SAMPLER
// ════════════════════════════════════
function sampleText(lines, opts={}) {
  const fs  = opts.fontSize || Math.min(W()*.12, 100);
  const sp  = opts.spacing  || fs * 1.22;
  const cx  = W()/2, cy = H()/2;
  const oc  = document.createElement('canvas');
  oc.width  = W(); oc.height = H();
  const ox  = oc.getContext('2d');
  ox.fillStyle = '#fff';
  ox.font = '800 '+fs+'px Syne, sans-serif';
  ox.textAlign = 'center';
  ox.textBaseline = 'middle';
  const totalH = lines.length * sp;
  const sy = cy - totalH/2 + sp/2;
  lines.forEach((l,li) => ox.fillText(l, cx, sy + li*sp));
  const px = ox.getImageData(0,0,W(),H()).data;
  const pts = [];
  const step = Math.max(2, Math.floor(Math.min(W(),H())/280));
  for (let y=0;y<H();y+=step)
    for (let x=0;x<W();x+=step)
      if (px[(y*W()+x)*4+3]>60) pts.push([x,y]);
  return pts;
}

// ════════════════════════════════════
// BEAR SAMPLER  — clean 2D cartoon bear
// ════════════════════════════════════
function sampleBear() {
  const oc  = document.createElement('canvas');
  oc.width  = W(); oc.height = H();
  const ox  = oc.getContext('2d');
  const cx  = W()/2;
  // center bear vertically — shift up a bit
  const cy  = H()/2 - H()*.04;
  const s   = Math.min(W(), H()) * 0.0028;

  const f  = c => { ox.fillStyle = c; };
  const sk = (c, w) => { ox.strokeStyle = c; ox.lineWidth = w*s; };

  // ── EARS (behind head)
  f('#8B5E3C');
  ox.beginPath(); ox.arc(cx-52*s, cy-80*s, 24*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+52*s, cy-80*s, 24*s, 0, Math.PI*2); ox.fill();
  f('#C4845A');
  ox.beginPath(); ox.arc(cx-52*s, cy-80*s, 14*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+52*s, cy-80*s, 14*s, 0, Math.PI*2); ox.fill();

  // ── BODY
  f('#A0673A');
  ox.beginPath(); ox.ellipse(cx, cy+50*s, 52*s, 68*s, 0, 0, Math.PI*2); ox.fill();
  // belly
  f('#D4A574');
  ox.beginPath(); ox.ellipse(cx, cy+58*s, 32*s, 44*s, 0, 0, Math.PI*2); ox.fill();

  // ── ARMS
  f('#A0673A');
  ox.beginPath(); ox.ellipse(cx-68*s, cy+20*s, 17*s, 40*s, -.35, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+68*s, cy+20*s, 17*s, 40*s, .35, 0, Math.PI*2); ox.fill();
  // paws
  f('#8B5E3C');
  ox.beginPath(); ox.ellipse(cx-72*s, cy+55*s, 15*s, 11*s, -.2, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+72*s, cy+55*s, 15*s, 11*s, .2, 0, Math.PI*2); ox.fill();

  // ── LEGS
  f('#8B5E3C');
  ox.beginPath(); ox.ellipse(cx-22*s, cy+108*s, 20*s, 28*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+22*s, cy+108*s, 20*s, 28*s, 0, 0, Math.PI*2); ox.fill();
  f('#7A5230');
  ox.beginPath(); ox.ellipse(cx-26*s, cy+132*s, 24*s, 13*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+26*s, cy+132*s, 24*s, 13*s, 0, 0, Math.PI*2); ox.fill();

  // ── HEAD
  f('#A0673A');
  ox.beginPath(); ox.arc(cx, cy-52*s, 58*s, 0, Math.PI*2); ox.fill();

  // ── SNOUT
  f('#D4A574');
  ox.beginPath(); ox.ellipse(cx, cy-34*s, 28*s, 22*s, 0, 0, Math.PI*2); ox.fill();

  // ── NOSE
  f('#2C1A0E');
  ox.beginPath(); ox.ellipse(cx, cy-44*s, 11*s, 8*s, 0, 0, Math.PI*2); ox.fill();

  // ── MOUTH
  sk('#2C1A0E', 1.8);
  ox.beginPath(); ox.moveTo(cx, cy-37*s); ox.lineTo(cx, cy-28*s); ox.stroke();
  ox.beginPath(); ox.arc(cx-7*s, cy-25*s, 7*s, 0, Math.PI); ox.stroke();
  ox.beginPath(); ox.arc(cx+7*s, cy-25*s, 7*s, 0, Math.PI); ox.stroke();

  // ── EYES
  f('#1A0D05');
  ox.beginPath(); ox.arc(cx-20*s, cy-65*s, 8*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+20*s, cy-65*s, 8*s, 0, Math.PI*2); ox.fill();
  f('#fff');
  ox.beginPath(); ox.arc(cx-17*s, cy-68*s, 3*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+23*s, cy-68*s, 3*s, 0, Math.PI*2); ox.fill();

  // ── BLUSH
  f('rgba(210,100,80,.38)');
  ox.beginPath(); ox.ellipse(cx-34*s, cy-55*s, 12*s, 8*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+34*s, cy-55*s, 12*s, 8*s, 0, 0, Math.PI*2); ox.fill();

  // ── SCARF
  f('#e74c3c');
  ox.beginPath(); ox.ellipse(cx, cy-2*s, 54*s, 12*s, 0, 0, Math.PI*2); ox.fill();
  f('#c0392b');
  ox.beginPath(); ox.rect(cx-14*s, cy-10*s, 28*s, 20*s); ox.fill();
  f('#e74c3c');
  ox.beginPath(); ox.rect(cx-10*s, cy-8*s, 20*s, 16*s); ox.fill();
  // scarf knot highlight
  f('#ff6b6b');
  ox.beginPath(); ox.arc(cx, cy+2*s, 5*s, 0, Math.PI*2); ox.fill();

  // sample pixels WITH colors
  const id  = ox.getImageData(0,0,W(),H());
  const px  = id.data;
  const step = Math.max(3, Math.floor(Math.min(W(),H())/230));
  const pts = [];
  for (let y=0;y<H();y+=step)
    for (let x=0;x<W();x+=step) {
      const idx = (y*W()+x)*4;
      if (px[idx+3] > 20)
        pts.push([x, y, px[idx], px[idx+1], px[idx+2]]);
    }
  return pts;
}

// ════════════════════════════════════
// SHAPE CACHE
// ════════════════════════════════════
const CACHE = {};
function getShape(mode) {
  if (CACHE[mode]) return CACHE[mode];
  let r;
  switch(mode) {
    case 'open':
      r = { pts: sampleText(['Haii!'], { fontSize: Math.min(W()*.18,150) }), bear: null };
      break;
    case 'index':
      r = { pts: sampleText(['Namaku','Dylphiiee'], { fontSize: Math.min(W()*.09,84), spacing: 108 }), bear: null };
      break;
    case 'fist':
      r = { pts: sampleText(['Seorang','Software','Engineering'], { fontSize: Math.min(W()*.068,70), spacing: 90 }), bear: null };
      break;
    case 'side':
      r = { pts: sampleText(['Terima','Kasih!'], { fontSize: Math.min(W()*.11,100), spacing: 118 }), bear: null };
      break;
    case 'peace': {
      const bear = sampleBear();
      r = { pts: bear, bear: true };
      break;
    }
    default:
      r = { pts: null, bear: false };
  }
  CACHE[mode] = r;
  return r;
}

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let mode    = 'idle';
let lerpSpd = 0.10;
const GUN   = { x: W()/2, y: H()/2, active: false };

// ════════════════════════════════════
// APPLY MODE — assign targets + colors
// ════════════════════════════════════
function applyMode(m, ptr) {
  if (m === 'idle') {
    const pal = PAL.idle;
    particles.forEach((p,i) => {
      p.tx = Math.random()*W();
      p.ty = Math.random()*H();
      p.color = pal[i%pal.length];
      p.r = p.baseR;
    });
    return;
  }

  if (m === 'gun') {
    // handled live in renderLoop
    setPalette('gun');
    return;
  }

  const shape = getShape(m);
  if (!shape || !shape.pts || shape.pts.length === 0) return;
  const pts = shape.pts;

  if (shape.bear) {
    // bear — use exact pixel colors
    particles.forEach((p,i) => {
      const s = pts[i % pts.length];
      p.tx    = s[0] + (Math.random()-.5)*1.5;
      p.ty    = s[1] + (Math.random()-.5)*1.5;
      p.color = 'rgb('+s[2]+','+s[3]+','+s[4]+')';
      p.r     = p.baseR * (.9 + Math.random()*.25);
    });
    return;
  }

  // text modes — color by horizontal gradient
  const pal = PAL[m] || PAL.idle;
  particles.forEach((p,i) => {
    const s   = pts[i % pts.length];
    p.tx      = s[0] + (Math.random()-.5)*1.2;
    p.ty      = s[1] + (Math.random()-.5)*1.2;
    const t   = Math.max(0, Math.min(.9999, s[0]/W()));
    p.color   = pal[Math.floor(t * pal.length)];
    p.r       = p.baseR * (.88 + Math.random()*.25);
  });
}

function setPalette(m) {
  const pal = PAL[m] || PAL.idle;
  particles.forEach((p,i) => {
    p.color = pal[i%pal.length];
  });
}

function setMode(m, ptr) {
  if (m === mode && m !== 'gun') return;
  mode    = m;
  lerpSpd = m === 'gun' ? 0.16 : 0.10;
  applyMode(m, ptr);
}

// ════════════════════════════════════
// GUN ( arc trail system
// ════════════════════════════════════
const ARC_TRAIL = [];   // [{x,y,t}]  t=timestamp
const ARC_LEN   = 32;  // max points in trail

function pushArcPoint(x, y) {
  ARC_TRAIL.push({ x, y, t: performance.now() });
  while (ARC_TRAIL.length > ARC_LEN) ARC_TRAIL.shift();
}

function drawArcTrail() {
  if (ARC_TRAIL.length < 3) return;
  const now = performance.now();
  // Draw trail as a series of arcs / curves that look like (
  for (let i = 1; i < ARC_TRAIL.length; i++) {
    const p0  = ARC_TRAIL[i-1];
    const p1  = ARC_TRAIL[i];
    const age = (now - p1.t) / 600;  // 0=fresh 1=old
    if (age > 1) continue;
    const alpha = (1 - age) * 0.9;
    const t     = i / ARC_TRAIL.length;
    const w     = t * 7 * (1-age);

    // Main arc stroke
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.strokeStyle = 'rgba(251,146,60,'+alpha+')';
    ctx.lineWidth   = w;
    ctx.lineCap     = 'round';
    ctx.shadowBlur  = 18;
    ctx.shadowColor = 'rgba(251,100,20,.85)';
    ctx.stroke();
    // inner bright core
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.strokeStyle = 'rgba(255,220,160,'+(alpha*.65)+')';
    ctx.lineWidth   = w * .28;
    ctx.shadowBlur  = 0;
    ctx.stroke();
    ctx.restore();
  }

  // Draw the ( arc shape at current tip
  if (!GUN.active || ARC_TRAIL.length < 2) return;
  const tip  = ARC_TRAIL[ARC_TRAIL.length-1];
  const prev = ARC_TRAIL[Math.max(0, ARC_TRAIL.length-5)];
  // direction of movement
  const dx  = tip.x - prev.x;
  const dy  = tip.y - prev.y;
  const ang = Math.atan2(dy, dx);
  // Draw a ( parenthesis arc perpendicular to movement
  const arcR = 28 + Math.min(Math.hypot(dx,dy)*2, 18);
  // ( open side faces direction of motion, curve faces opposite
  const openAng  = ang;
  const startAng = openAng + Math.PI*.45;
  const endAng   = openAng - Math.PI*.45;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.beginPath();
  // arc center is offset behind the tip
  const arcCx = tip.x - Math.cos(ang) * arcR * .6;
  const arcCy = tip.y - Math.sin(ang) * arcR * .6;
  ctx.arc(arcCx, arcCy, arcR, startAng, endAng, true);
  ctx.strokeStyle = 'rgba(254,215,100,.9)';
  ctx.lineWidth   = 3.5;
  ctx.lineCap     = 'round';
  ctx.shadowBlur  = 22;
  ctx.shadowColor = 'rgba(251,150,40,.9)';
  ctx.stroke();
  // inner white core of (
  ctx.beginPath();
  ctx.arc(arcCx, arcCy, arcR, startAng, endAng, true);
  ctx.strokeStyle = 'rgba(255,245,200,.55)';
  ctx.lineWidth   = 1.2;
  ctx.shadowBlur  = 0;
  ctx.stroke();
  ctx.restore();
}

// gun particles orbit fingertip in arcing formation
function applyGunParticles() {
  const cx = GUN.x, cy = GUN.y;
  const pal = PAL.gun;
  const time = performance.now() * 0.001;
  particles.forEach((p,i) => {
    const t      = i/N;
    const angle  = t * Math.PI * 2 * 4 + time * 1.8;
    // ( arc shape: semicircle on left side of pointer
    const arcAng = (t * Math.PI * 1.1) - Math.PI * .55;
    const r      = 18 + (i%8)*5;
    p.tx    = cx + Math.cos(arcAng + Math.PI) * r + Math.cos(angle)*(i%4)*1.2;
    p.ty    = cy + Math.sin(arcAng) * r + Math.sin(angle)*(i%4)*1.2;
    p.color = pal[i%pal.length];
    p.r     = .35 + Math.random()*.5;
  });
}

// ════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════
let time = 0;
function renderLoop() {
  requestAnimationFrame(renderLoop);
  time += 0.013;

  ctx.clearRect(0, 0, W(), H());

  // ambient floaters (drawn behind everything)
  updateAmbient(mode);

  // gun: update arc shape every frame
  if (mode === 'gun' && GUN.active) {
    applyGunParticles();
    pushArcPoint(GUN.x, GUN.y);
  }

  // lerp & draw particles
  particles.forEach(p => {
    p.update(lerpSpd, mode);
    p.draw();
  });

  // arc trail on top
  if (mode === 'gun') drawArcTrail();

  // fade old trail points when gun not active
  if (!GUN.active && ARC_TRAIL.length > 0) {
    const now = performance.now();
    while (ARC_TRAIL.length > 0 && now - ARC_TRAIL[0].t > 500) ARC_TRAIL.shift();
  }
}

// ════════════════════════════════════
// MEDIAPIPE HAND DRAWING
// ════════════════════════════════════
const vid  = document.getElementById('vid');
const hc   = document.getElementById('hc');
const hctx = hc.getContext('2d');
hc.width = 148; hc.height = 110;

const HP = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const TIPS_S  = new Set([4,8,12,16,20]);
const BASES_S = new Set([0,1,2,5,9,13,17]);

function drawHand(lms) {
  const cw = hc.width, ch = hc.height;
  // Mirror x to match CSS scaleX(-1) on video
  const mx2 = x => (1-x)*cw;
  const my2 = y => y*ch;
  hctx.save();
  hctx.shadowBlur = 7; hctx.shadowColor = 'rgba(96,165,250,.7)';
  hctx.strokeStyle = 'rgba(59,130,246,.72)'; hctx.lineWidth = 1.5;
  for (const [a,b] of HP) {
    hctx.beginPath();
    hctx.moveTo(mx2(lms[a].x), my2(lms[a].y));
    hctx.lineTo(mx2(lms[b].x), my2(lms[b].y));
    hctx.stroke();
  }
  hctx.restore();
  for (let i=0;i<lms.length;i++) {
    const px2=mx2(lms[i].x), py2=my2(lms[i].y);
    const r2  = TIPS_S.has(i) ? 3.2 : BASES_S.has(i) ? 1.8 : 2.2;
    const col = TIPS_S.has(i) ? 'rgba(147,197,253,.95)' : BASES_S.has(i) ? 'rgba(37,99,235,.85)' : 'rgba(59,130,246,.75)';
    hctx.save();
    hctx.shadowBlur = TIPS_S.has(i)?10:5;
    hctx.shadowColor = 'rgba(147,197,253,.9)';
    hctx.beginPath(); hctx.arc(px2, py2, r2, 0, Math.PI*2);
    hctx.fillStyle = col; hctx.fill();
    hctx.restore();
  }
}

// ════════════════════════════════════
// GESTURE DETECTION
// ════════════════════════════════════
const isUp   = (tip, mcp) => tip.y < mcp.y - 0.028;
const isDown = (tip, pip) => tip.y > pip.y + 0.018;

function detect(mhl) {
  if (!mhl || !mhl.length) return null;
  const lm = mhl[0];
  // MediaPipe 21 landmarks: 0=wrist,1-4=thumb,5-8=index,9-12=middle,13-16=ring,17-20=pinky
  const wrist=lm[0];
  const thumbMCP=lm[2], thumbTip=lm[4];
  const iMCP=lm[5],  iPIP=lm[6],  iTip=lm[8];
  const mMCP=lm[9],  mPIP=lm[10], mTip=lm[12];
  const rMCP=lm[13], rPIP=lm[14], rTip=lm[16];
  const pMCP=lm[17], pPIP=lm[18], pTip=lm[20];

  const iU = isUp(iTip,iMCP), mU = isUp(mTip,mMCP);
  const rU = isUp(rTip,rMCP), pU = isUp(pTip,pMCP);
  const iD = isDown(iTip,iPIP), mD = isDown(mTip,mPIP);
  const rD = isDown(rTip,rPIP), pD = isDown(pTip,pPIP);
  const thumbExt = Math.abs(thumbTip.x - thumbMCP.x) > 0.04;
  const ext = [iU,mU,rU,pU].filter(Boolean).length;

  // FIST — all fingers clearly curled
  if (iD && mD && rD && pD) return 'fist';

  // OPEN — all fingers up = Haii!
  if (ext >= 4) {
    const ks = Math.abs(lm[5].x - lm[17].x);
    if (ks < 0.08) return 'side';
    return 'open';
  }

  // INDEX only
  if (iU && !mU && !rU && !pU && !thumbExt) return 'index';

  // TWO FINGERS
  if (iU && mU && !rU && !pU) {
    const spread = Math.abs(iTip.x - mTip.x);
    return spread > 0.044 ? 'peace' : 'gun';
  }

  return null;
}

let lastG=null, gStart=0, noHandTimer=null;
const G_THRESH = 240;

function onResults(res) {
  hctx.clearRect(0,0,hc.width,hc.height);

  if (res.multiHandLandmarks && res.multiHandLandmarks.length) {
    if (noHandTimer) { clearTimeout(noHandTimer); noHandTimer=null; }
    const lms = res.multiHandLandmarks[0];
    drawHand(lms);

    const det = detect(res.multiHandLandmarks);
    const now = performance.now();

    if (det === 'gun') {
      const mx = ((1-lms[8].x) + (1-lms[12].x)) / 2 * W();
      const my = (lms[8].y + lms[12].y) / 2 * H();
      GUN.x = mx; GUN.y = my; GUN.active = true;
    } else {
      GUN.active = false;
    }

    if (det && det !== lastG) { lastG=det; gStart=now; }
    if (det && det===lastG && now-gStart > G_THRESH) {
      if (det==='gun') setMode('gun', GUN);
      else setMode(det);
      gStart = now - G_THRESH + 500;
    }
    if (!det) lastG=null;
  } else {
    GUN.active = false;
    if (mode !== 'idle' && !noHandTimer) {
      noHandTimer = setTimeout(()=>{ setMode('idle'); noHandTimer=null; }, 1600);
    }
  }
}

// ════════════════════════════════════
// MEDIAPIPE INIT
// ════════════════════════════════════
async function loadMP() {
  return new Promise(ok => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js';
    s1.crossOrigin='anonymous';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
      s2.crossOrigin='anonymous';
      s2.onload = ok;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  });
}

async function startTracking() {
  await loadMP();
  if (typeof Hands === 'undefined') return;
  const hands = new Hands({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f });
  hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:.60, minTrackingConfidence:.50 });
  hands.onResults(onResults);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:320,height:240,facingMode:'user'} });
    vid.srcObject = stream; await vid.play();
    const loop = async () => {
      if (vid.readyState >= 2) await hands.send({ image: vid });
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  } catch(e) { console.warn('Camera denied'); }
}

// ════════════════════════════════════
// RESIZE
// ════════════════════════════════════
window.addEventListener('resize', () => {
  mc.width = W(); mc.height = H();
  Object.keys(CACHE).forEach(k => delete CACHE[k]);
  const m = mode; mode = '';
  setMode(m, GUN);
});

// ════════════════════════════════════
// KEYBOARD  1-6
// ════════════════════════════════════
document.addEventListener('keydown', e => {
  const map = {'1':'open','2':'index','3':'fist','4':'side','5':'peace','6':'gun'};
  if (map[e.key]) {
    mode = '';
    GUN.x = W()/2; GUN.y = H()/2; GUN.active = e.key==='6';
    setMode(map[e.key], GUN);
  }
});

// ════════════════════════════════════
// BOOT
// ════════════════════════════════════
setMode('idle');
renderLoop();
startTracking();
</script>
</body>
</html>
