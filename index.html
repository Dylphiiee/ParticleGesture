<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dylphiiee · V1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:ital,wght@0,300;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
@supports (height: 100dvh){
  html,body{height:100dvh}
}
#mc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:block}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:22px 26px 18px}
#topbar{display:flex;justify-content:space-between;align-items:flex-start}
#logo{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:.12em;color:rgba(255,255,255,.85);line-height:1}
#logo-sub{font-family:'DM Mono',monospace;font-size:7.5px;font-style:italic;letter-spacing:.22em;color:rgba(255,255,255,.22);text-transform:uppercase;margin-top:3px}
#chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:4px 12px 4px 8px}
#cdot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
#ctxt{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.18em;color:rgba(255,255,255,.32);text-transform:uppercase}
#bottombar{display:flex;align-items:flex-end;justify-content:flex-end}
#cw{width:148px;height:110px;border-radius:10px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.7)}
#vid{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);filter:brightness(.75)}
#hc{position:absolute;inset:0;width:100%;height:100%;z-index:2}
#cb{position:absolute;top:6px;left:7px;z-index:4;display:flex;align-items:center;gap:3px}
#cld{width:4px;height:4px;border-radius:50%;background:#ef4444;animation:pd 1.2s infinite;box-shadow:0 0 5px #ef4444}
#clt{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.14em;color:rgba(255,255,255,.38);text-transform:uppercase}
#ctl{position:fixed;top:0;left:0;width:48px;height:48px;border-top:1px solid rgba(255,255,255,.07);border-left:1px solid rgba(255,255,255,.07);z-index:9;pointer-events:none}
#cbr{position:fixed;bottom:0;right:0;width:48px;height:48px;border-bottom:1px solid rgba(255,255,255,.07);border-right:1px solid rgba(255,255,255,.07);z-index:9;pointer-events:none}
#ticker{position:fixed;bottom:0;left:0;right:0;height:24px;z-index:8;overflow:hidden;border-top:1px solid rgba(255,255,255,.04);pointer-events:none}
#ti{display:flex;height:100%;align-items:center;white-space:nowrap;animation:tick 32s linear infinite}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.09);text-transform:uppercase;padding:0 24px}
.ts{color:rgba(255,255,255,.04)}

@media (orientation: portrait) {
  #ui{padding:18px 18px 16px}
  #cw{width:120px;height:90px}
}
@media (orientation: landscape) and (max-height: 500px) {
  #ui{padding:12px 18px 12px}
  #cw{width:110px;height:82px}
  #ticker{height:20px}
}
</style>
</head>
<body>
<canvas id="mc"></canvas>
<div id="ctl"></div><div id="cbr"></div>
<div id="ui">
  <div id="topbar">
    <div><div id="logo">Dylphiiee</div><div id="logo-sub">Particle Interface · V1</div></div>
    <div id="chip"><div id="cdot"></div><div id="ctxt">Ready</div></div>
  </div>
  <div id="bottombar">
    <div id="cw">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="hc"></canvas>
      <div id="cb"><div id="cld"></div><div id="clt">live</div></div>
    </div>
  </div>
</div>
<div id="ticker"><div id="ti">
  <span class="ti">Dylphiiee</span><span class="ts">·</span>
  <span class="ti">Particle Interface</span><span class="ts">·</span>
  <span class="ti">Software Engineering</span><span class="ts">·</span>
  <span class="ti">MediaPipe Hands</span><span class="ts">·</span>
  <span class="ti">Interactive Art</span><span class="ts">·</span>
  <span class="ti">Dylphiiee</span><span class="ts">·</span>
  <span class="ti">Particle Interface</span><span class="ts">·</span>
  <span class="ti">Software Engineering</span><span class="ts">·</span>
  <span class="ti">MediaPipe Hands</span><span class="ts">·</span>
  <span class="ti">Interactive Art</span><span class="ts">·</span>
</div></div>

<script>
// ════════════════════════════════════
// CANVAS SETUP
// ════════════════════════════════════
const mc  = document.getElementById('mc');
const ctx = mc.getContext('2d');
function W(){ return window.visualViewport ? window.visualViewport.width  : window.innerWidth; }
function H(){ return window.visualViewport ? window.visualViewport.height : window.innerHeight; }
function resizeCanvas(){
  mc.width  = W();
  mc.height = H();
  mc.style.width  = W()+'px';
  mc.style.height = H()+'px';
}
resizeCanvas();
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{ resizeCanvas(); });
}

// ════════════════════════════════════
// PALETTES
// ════════════════════════════════════
const PAL = {
  idle:  ['#0d1f3c','#142850','#0a1628','#1a2f5a','#0f1e40'],
  open:  ['#fbbf24','#f59e0b','#fde68a','#f97316','#fcd34d'],
  index: ['#38bdf8','#0ea5e9','#7dd3fc','#0284c7','#bae6fd'],
  fist:  ['#4ade80','#22c55e','#86efac','#16a34a','#bbf7d0'],
  side:  ['#c084fc','#a855f7','#e9d5ff','#7c3aed','#ddd6fe'],
  peace: null,
  gun:   ['#fb923c','#ef4444','#fcd34d','#f97316','#fee2e2'],
};

// ════════════════════════════════════
// PARTICLES
// ════════════════════════════════════
const N = 2600;

class P {
  constructor(i) {
    this.i = i;
    this.reset();
    this.x = Math.random() * W();
    this.y = Math.random() * H();
    this.life = Math.random() * Math.PI * 2;
  }
  reset() {
    this.x  = Math.random() * W();
    this.y  = Math.random() * H();
    this.tx = this.x; this.ty = this.y;
    this.vx = 0; this.vy = 0;
    this.r  = 0.5 + Math.random() * 0.8;
    this.baseR = this.r;
    this.color = '#0d1f3c';
    this.dx = (Math.random()-.5)*.2;
    this.dy = (Math.random()-.5)*.2;
    this.life = Math.random() * Math.PI * 2;
  }
  update(spd, mode) {
    this.life += 0.012;
    if (mode === 'idle') {
      this.tx += this.dx + Math.sin(this.life + this.i*.002)*.06;
      this.ty += this.dy + Math.cos(this.life*.7 + this.i*.003)*.06;
      if (this.tx < 0 || this.tx > W()) this.dx *= -1;
      if (this.ty < 0 || this.ty > H()) this.dy *= -1;
    }
    const ex = this.tx - this.x;
    const ey = this.ty - this.y;
    this.vx = (this.vx + ex * spd) * 0.68;
    this.vy = (this.vy + ey * spd) * 0.68;
    this.x += this.vx;
    this.y += this.vy;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

const particles = Array.from({length:N}, (_,i) => new P(i));

// ════════════════════════════════════
// AMBIENT PARTICLES
// ════════════════════════════════════
const ANOISE = 180;
const ambient = Array.from({length:ANOISE}, (_,i) => ({
  x: Math.random()*W(), y: Math.random()*H(),
  vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
  r: 0.3 + Math.random()*.5,
  color:'#1a3a6e', life: Math.random()*Math.PI*2,
  i
}));

function updateAmbient(mode) {
  const pal = PAL[mode] || PAL.idle;
  for (const a of ambient) {
    a.life += 0.015;
    a.x += a.vx + Math.sin(a.life + a.i*.08)*.08;
    a.y += a.vy + Math.cos(a.life*.6 + a.i*.07)*.08;
    if (a.x < -20) a.x = W()+5;
    if (a.x > W()+20) a.x = -5;
    if (a.y < -20) a.y = H()+5;
    if (a.y > H()+20) a.y = -5;
    if (mode !== 'idle') {
      a.color = pal[a.i % pal.length];
    } else {
      a.color = '#1e3a5f';
    }
    ctx.globalAlpha = 0.18 + Math.sin(a.life)*0.08;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
    ctx.fillStyle = a.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function SHORT(){ return Math.min(W(), H()); }

// Core pixel sampler — reads a canvas WxH, returns [[nx,ny]…] normalized to screen
function _sampleCanvas(oc, step=4) {
  const sw = oc.width, sh = oc.height;
  const px = oc.getContext('2d').getImageData(0, 0, sw, sh).data;
  const pts = [];
  for (let y = 0; y < sh; y += step)
    for (let x = 0; x < sw; x += step)
      if (px[(y * sw + x) * 4 + 3] > 60)
        pts.push([x / W(), y / H()]);   // normalized to SCREEN, not canvas
  return pts;
}

// Shared text-render helper — canvas = screen size, padY berlaku top DAN bottom.
// Teks dijamin tidak terpotong di atas maupun bawah.
function _renderTextLines(oc, lines, padX, padY, initFS) {
  const ox     = oc.getContext('2d');
  const availW = oc.width  - padX * 2;
  const availH = oc.height - padY * 2;
  let fs = initFS;
  for (let t = 0; t < 60; t++) {
    ox.font = '800 ' + Math.ceil(fs) + 'px Syne, sans-serif';
    const maxW   = Math.max(...lines.map(l => ox.measureText(l).width));
    const totalH = lines.length * fs * 1.28;   // line-height lebih longgar
    if (maxW <= availW && totalH <= availH) break;
    fs *= 0.85;
  }
  const lineH  = fs * 1.28;
  const totalH = lines.length * lineH;
  // Center di dalam zona aman [padY .. height-padY]
  const safeCenter = padY + availH / 2;
  const startY     = safeCenter - totalH / 2 + lineH / 2;
  ox.fillStyle    = '#fff';
  ox.font         = '800 ' + Math.ceil(fs) + 'px Syne, sans-serif';
  ox.textAlign    = 'center';
  ox.textBaseline = 'middle';
  lines.forEach((l, li) => ox.fillText(l, oc.width / 2, startY + li * lineH));
}

// ════════════════════════════════════
// DEDICATED SAMPLER — mode "open"
// "Haii!" — satu kata besar, canvas W×H
// Font besar, padding longgar, centered
// ════════════════════════════════════
function sampleOpen() {
  const oc = document.createElement('canvas');
  oc.width  = W();
  oc.height = H();
  // Padding minimal agar teks bisa sebesar mungkin
  const padX = W() * 0.04;
  const padY = H() * 0.08;
  _renderTextLines(oc, ['Haii!'], padX, padY, Math.min(W(), H()) * 0.40);
  return _sampleCanvas(oc, 4);
}

// ════════════════════════════════════
// DEDICATED SAMPLER — mode "index"
// "Namaku / Dylphiiee" — dua baris,
// canvas W×H, font disesuaikan agar
// nama panjang "Dylphiiee" tidak terpotong
// ════════════════════════════════════
function sampleIndex() {
  const oc = document.createElement('canvas');
  oc.width  = W();
  oc.height = H();
  // padY 18% top+bottom — dua baris aman tidak terpotong
  const padX = W() * 0.05;
  const padY = H() * 0.18;
  _renderTextLines(oc, ['Namaku', 'Dylphiiee'], padX, padY, Math.min(W(), H()) * 0.25);
  return _sampleCanvas(oc, 4);
}

// ════════════════════════════════════
// DEDICATED SAMPLER — mode "fist"
// "Seorang / Software / Engineering"
// tiga baris, canvas W×H, font lebih
// kecil agar semua baris muat
// ════════════════════════════════════
function sampleFist() {
  const oc = document.createElement('canvas');
  oc.width  = W();
  oc.height = H();
  // Tiga baris — padY 16% top+bottom, font mulai 18% SHORT agar muat
  const padX = W() * 0.05;
  const padY = H() * 0.16;
  _renderTextLines(oc, ['Seorang', 'Software', 'Engineering'], padX, padY, Math.min(W(), H()) * 0.18);
  return _sampleCanvas(oc, 4);
}

// ════════════════════════════════════
// DEDICATED SAMPLER — mode "side" (gesture: thumbs up 👍)
// "Terima / Kasih!" — dua baris,
// canvas W×H, padding aman top+bottom
// ════════════════════════════════════
function sampleSide() {
  const oc = document.createElement('canvas');
  oc.width  = W();
  oc.height = H();
  const padX = W() * 0.05;
  const padY = H() * 0.18;
  _renderTextLines(oc, ['Terima', 'Kasih!'], padX, padY, Math.min(W(), H()) * 0.28);
  return _sampleCanvas(oc, 4);
}

// ════════════════════════════════════
// BEAR SAMPLER — canvas sized to screen
// Bear punya canvasnya sendiri = screen
// ════════════════════════════════════
function sampleBear() {
  // Use screen size directly as canvas
  const BW = W();
  const BH = H();

  const oc  = document.createElement('canvas');
  oc.width  = BW;
  oc.height = BH;
  const ox  = oc.getContext('2d');

  // Center of bear on screen
  const cx  = BW / 2;
  // Fit bear height into 80% of screen height, centered slightly up
  const bearNativeH = 900;  // design units
  const scale = (BH * 0.80) / bearNativeH;
  const cy  = BH / 2 + BH * 0.04;   // slight downward offset for head room

  const s = scale * 280;  // scale factor relative to original s = BH*0.0028

  const f  = c => { ox.fillStyle = c; };
  const sk = (c, w) => { ox.strokeStyle = c; ox.lineWidth = w * s; };

  // ── EARS (behind head)
  f('#8B5E3C');
  ox.beginPath(); ox.arc(cx-52*s, cy-80*s, 24*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+52*s, cy-80*s, 24*s, 0, Math.PI*2); ox.fill();
  f('#C4845A');
  ox.beginPath(); ox.arc(cx-52*s, cy-80*s, 14*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+52*s, cy-80*s, 14*s, 0, Math.PI*2); ox.fill();

  // ── BODY
  f('#A0673A');
  ox.beginPath(); ox.ellipse(cx, cy+50*s, 52*s, 68*s, 0, 0, Math.PI*2); ox.fill();
  f('#D4A574');
  ox.beginPath(); ox.ellipse(cx, cy+58*s, 32*s, 44*s, 0, 0, Math.PI*2); ox.fill();

  // ── ARMS
  f('#A0673A');
  ox.beginPath(); ox.ellipse(cx-68*s, cy+20*s, 17*s, 40*s, -.35, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+68*s, cy+20*s, 17*s, 40*s, .35, 0, Math.PI*2); ox.fill();
  f('#8B5E3C');
  ox.beginPath(); ox.ellipse(cx-72*s, cy+55*s, 15*s, 11*s, -.2, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+72*s, cy+55*s, 15*s, 11*s, .2, 0, Math.PI*2); ox.fill();

  // ── LEGS
  f('#8B5E3C');
  ox.beginPath(); ox.ellipse(cx-22*s, cy+108*s, 20*s, 28*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+22*s, cy+108*s, 20*s, 28*s, 0, 0, Math.PI*2); ox.fill();
  f('#7A5230');
  ox.beginPath(); ox.ellipse(cx-26*s, cy+132*s, 24*s, 13*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+26*s, cy+132*s, 24*s, 13*s, 0, 0, Math.PI*2); ox.fill();

  // ── HEAD
  f('#A0673A');
  ox.beginPath(); ox.arc(cx, cy-52*s, 58*s, 0, Math.PI*2); ox.fill();

  // ── SNOUT
  f('#D4A574');
  ox.beginPath(); ox.ellipse(cx, cy-34*s, 28*s, 22*s, 0, 0, Math.PI*2); ox.fill();

  // ── NOSE
  f('#2C1A0E');
  ox.beginPath(); ox.ellipse(cx, cy-44*s, 11*s, 8*s, 0, 0, Math.PI*2); ox.fill();

  // ── MOUTH
  sk('#2C1A0E', 1.8);
  ox.beginPath(); ox.moveTo(cx, cy-37*s); ox.lineTo(cx, cy-28*s); ox.stroke();
  ox.beginPath(); ox.arc(cx-7*s, cy-25*s, 7*s, 0, Math.PI); ox.stroke();
  ox.beginPath(); ox.arc(cx+7*s, cy-25*s, 7*s, 0, Math.PI); ox.stroke();

  // ── EYES
  f('#1A0D05');
  ox.beginPath(); ox.arc(cx-20*s, cy-65*s, 8*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+20*s, cy-65*s, 8*s, 0, Math.PI*2); ox.fill();
  f('#fff');
  ox.beginPath(); ox.arc(cx-17*s, cy-68*s, 3*s, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.arc(cx+23*s, cy-68*s, 3*s, 0, Math.PI*2); ox.fill();

  // ── BLUSH
  f('rgba(210,100,80,.38)');
  ox.beginPath(); ox.ellipse(cx-34*s, cy-55*s, 12*s, 8*s, 0, 0, Math.PI*2); ox.fill();
  ox.beginPath(); ox.ellipse(cx+34*s, cy-55*s, 12*s, 8*s, 0, 0, Math.PI*2); ox.fill();

  // ── SCARF
  f('#e74c3c');
  ox.beginPath(); ox.ellipse(cx, cy-2*s, 54*s, 12*s, 0, 0, Math.PI*2); ox.fill();
  f('#c0392b');
  ox.beginPath(); ox.rect(cx-14*s, cy-10*s, 28*s, 20*s); ox.fill();
  f('#e74c3c');
  ox.beginPath(); ox.rect(cx-10*s, cy-8*s, 20*s, 16*s); ox.fill();
  f('#ff6b6b');
  ox.beginPath(); ox.arc(cx, cy+2*s, 5*s, 0, Math.PI*2); ox.fill();

  // Sample pixels — coords already in screen space, normalize to 0-1
  const id   = ox.getImageData(0, 0, BW, BH);
  const px   = id.data;
  const step = 4;
  const pts  = [];
  for (let y = 0; y < BH; y += step)
    for (let x = 0; x < BW; x += step) {
      const idx = (y * BW + x) * 4;
      if (px[idx+3] > 20)
        pts.push([x / BW, y / BH, px[idx], px[idx+1], px[idx+2]]);
    }
  return pts;
}

// ════════════════════════════════════
// SHAPE CACHE — keyed by mode+dimensions
// ════════════════════════════════════
const CACHE = {};

function cacheKey(mode) {
  // Include screen size in key so cache invalidates on resize
  return mode + '|' + W() + 'x' + H();
}

function getShape(mode) {
  const key = cacheKey(mode);
  if (CACHE[key]) return CACHE[key];

  let r;
  switch(mode) {
    case 'open':
      // Canvas W×H khusus "Haii!" — satu kata, font besar
      r = { pts: sampleOpen(), bear: false };
      break;
    case 'index':
      // Canvas W×H khusus dua baris "Namaku / Dylphiiee"
      r = { pts: sampleIndex(), bear: false };
      break;
    case 'fist':
      // Canvas W×H khusus tiga baris "Seorang / Software / Engineering"
      r = { pts: sampleFist(), bear: false };
      break;
    case 'side':
      // Canvas W×H khusus dua baris "Terima / Kasih!"
      r = { pts: sampleSide(), bear: false };
      break;
    case 'peace': {
      // Canvas W×H khusus bear — warna per-pixel
      r = { pts: sampleBear(), bear: true };
      break;
    }
    default:
      r = { pts: null, bear: false };
  }
  CACHE[key] = r;
  return r;
}

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let mode    = 'idle';
let lerpSpd = 0.10;
const GUN   = { x: W()/2, y: H()/2, active: false };

// ════════════════════════════════════
// APPLY MODE
// ════════════════════════════════════
function applyMode(m, ptr) {
  if (m === 'idle') {
    const pal = PAL.idle;
    particles.forEach((p,i) => {
      p.tx = Math.random()*W();
      p.ty = Math.random()*H();
      p.color = pal[i%pal.length];
      p.r = p.baseR;
    });
    return;
  }

  if (m === 'gun') {
    setPalette('gun');
    return;
  }

  const shape = getShape(m);
  if (!shape || !shape.pts || shape.pts.length === 0) return;
  const pts = shape.pts;

  if (shape.bear) {
    // Bear: pts are already normalized to screen [0-1], map directly
    particles.forEach((p,i) => {
      const s = pts[i % pts.length];
      p.tx    = s[0] * W() + (Math.random()-.5)*2;
      p.ty    = s[1] * H() + (Math.random()-.5)*2;
      p.color = 'rgb('+s[2]+','+s[3]+','+s[4]+')';
      p.r     = p.baseR * (.9 + Math.random()*.25);
    });
    return;
  }

  // Text: pts normalized to screen [0-1], map directly — no clipping possible
  const pal = PAL[m] || PAL.idle;
  particles.forEach((p,i) => {
    const s  = pts[i % pts.length];
    p.tx     = s[0] * W() + (Math.random()-.5)*1.5;
    p.ty     = s[1] * H() + (Math.random()-.5)*1.5;
    const t  = Math.max(0, Math.min(.9999, s[0]));
    p.color  = pal[Math.floor(t * pal.length)];
    p.r      = p.baseR * (.88 + Math.random()*.25);
  });
}

function setPalette(m) {
  const pal = PAL[m] || PAL.idle;
  particles.forEach((p,i) => {
    p.color = pal[i%pal.length];
  });
}

function setMode(m, ptr) {
  if (m === mode && m !== 'gun') return;
  mode    = m;
  lerpSpd = m === 'gun' ? 0.16 : 0.10;
  applyMode(m, ptr);
}

// ════════════════════════════════════
// MAGIC CIRCLE SYSTEM
// ════════════════════════════════════
const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'];
let magicRot    = 0;
let magicRot2   = 0;
let magicPulse  = 0;

function drawMagicCircle(cx, cy) {
  const now   = performance.now() * 0.001;
  const base  = Math.min(Math.min(W(),H()) * 0.16, 90);

  magicRot  += 0.018;
  magicRot2 -= 0.012;
  magicPulse = Math.sin(now * 2.4) * 0.04 + 1.0;

  const R1 = base * magicPulse;
  const R2 = base * .72 * magicPulse;
  const R3 = base * .44 * magicPulse;
  const R4 = base * .22 * magicPulse;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  const halo = ctx.createRadialGradient(cx, cy, R1*.7, cx, cy, R1*1.4);
  halo.addColorStop(0, 'rgba(168,85,247,.18)');
  halo.addColorStop(1, 'rgba(168,85,247,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R1*1.4, 0, Math.PI*2);
  ctx.fillStyle = halo;
  ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(magicRot);
  for (let k = 0; k < 2; k++) {
    const rr = R1 - k*4;
    ctx.beginPath();
    ctx.arc(0, 0, rr, 0, Math.PI*2);
    ctx.strokeStyle = k===0 ? 'rgba(192,132,252,.85)' : 'rgba(216,180,254,.4)';
    ctx.lineWidth   = k===0 ? 2.2 : 1;
    ctx.shadowBlur  = k===0 ? 14 : 0;
    ctx.shadowColor = 'rgba(192,132,252,.9)';
    ctx.stroke();
  }
  const ticks = 24;
  for (let t2 = 0; t2 < ticks; t2++) {
    const a   = (t2 / ticks) * Math.PI * 2;
    const len = t2 % 6 === 0 ? 10 : t2 % 3 === 0 ? 6 : 3;
    const r0  = R1 + 3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r0,       Math.sin(a)*r0);
    ctx.lineTo(Math.cos(a)*(r0+len), Math.sin(a)*(r0+len));
    ctx.strokeStyle = 'rgba(216,180,254,'+(t2%6===0?.9:.45)+')';
    ctx.lineWidth   = t2%6===0 ? 1.5 : 0.8;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }
  ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(192,132,252,.8)';
  ctx.fillStyle  = 'rgba(233,213,255,.82)';
  const runeCount = 12;
  const fz = Math.max(8, R1 * .15);
  ctx.font = fz+'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let t2=0; t2<runeCount; t2++) {
    const a = (t2/runeCount)*Math.PI*2;
    const rx = Math.cos(a)*(R1+18), ry = Math.sin(a)*(R1+18);
    ctx.save();
    ctx.translate(rx, ry);
    ctx.rotate(a + Math.PI/2);
    ctx.fillText(RUNES[t2%RUNES.length], 0, 0);
    ctx.restore();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(magicRot2);
  ctx.beginPath();
  ctx.arc(0, 0, R2, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(139,92,246,.8)';
  ctx.lineWidth   = 1.8;
  ctx.shadowBlur  = 10;
  ctx.shadowColor = 'rgba(139,92,246,.85)';
  ctx.stroke();
  for (let tri = 0; tri < 2; tri++) {
    ctx.beginPath();
    for (let v = 0; v < 3; v++) {
      const a = (v/3)*Math.PI*2 + (tri*Math.PI/3) + magicRot2;
      if (v===0) ctx.moveTo(Math.cos(a)*R2, Math.sin(a)*R2);
      else       ctx.lineTo(Math.cos(a)*R2, Math.sin(a)*R2);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(167,139,250,.55)';
    ctx.lineWidth   = 1.2;
    ctx.shadowBlur  = 6;
    ctx.stroke();
  }
  for (let t2=0; t2<6; t2++) {
    const a = (t2/6)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(Math.cos(a)*R2, Math.sin(a)*R2, 2.5, 0, Math.PI*2);
    ctx.fillStyle  = 'rgba(216,180,254,.9)';
    ctx.shadowBlur = 8;
    ctx.shadowColor= 'rgba(192,132,252,1)';
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(magicRot * 1.8);
  ctx.beginPath();
  ctx.arc(0, 0, R3, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(167,139,250,.7)';
  ctx.lineWidth   = 1.4;
  ctx.shadowBlur  = 8;
  ctx.shadowColor = 'rgba(167,139,250,.8)';
  ctx.stroke();
  for (let t2=0; t2<4; t2++) {
    const a = (t2/4)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a)*R3, Math.sin(a)*R3);
    ctx.strokeStyle = 'rgba(196,181,253,.35)';
    ctx.lineWidth   = 0.8;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }
  ctx.restore();

  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R4*1.6);
  coreGrad.addColorStop(0,   'rgba(245,208,254,.9)');
  coreGrad.addColorStop(0.4, 'rgba(192,132,252,.6)');
  coreGrad.addColorStop(1,   'rgba(139,92,246,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R4*1.6, 0, Math.PI*2);
  ctx.fillStyle = coreGrad;
  ctx.shadowBlur = 20;
  ctx.shadowColor = 'rgba(192,132,252,1)';
  ctx.fill();

  const sparkCount = 8;
  for (let s=0; s<sparkCount; s++) {
    const sa  = (s/sparkCount)*Math.PI*2 + now*1.1 + s*0.4;
    const sr  = R1 * (.82 + Math.sin(now*2+s)*0.12);
    const sx  = cx + Math.cos(sa)*sr;
    const sy  = cy + Math.sin(sa)*sr;
    const salpha = (.5 + Math.sin(now*3+s*1.3)*.4);
    ctx.beginPath();
    ctx.arc(sx, sy, 2.2, 0, Math.PI*2);
    ctx.fillStyle  = 'rgba(245,208,254,'+salpha+')';
    ctx.shadowBlur = 10;
    ctx.shadowColor= 'rgba(192,132,252,.9)';
    ctx.fill();
  }

  ctx.restore();
}

function applyGunParticles() {
  const cx  = GUN.x, cy = GUN.y;
  const magicPal = ['#c084fc','#a855f7','#e9d5ff','#7c3aed','#ddd6fe','#f5d0fe','#d946ef'];
  const t0  = performance.now() * 0.001;
  particles.forEach((p,i) => {
    const ring  = i % 3;
    const baseR = Math.min(Math.min(W(),H())*.14, 80);
    const radii = [baseR*.55, baseR*.82, baseR*1.05];
    const r     = radii[ring] + Math.sin(t0*1.2 + i*.08) * 4;
    const angle = (i / N) * Math.PI * 2 * (ring===0?3:ring===1?5:7)
                  + t0 * (ring===0?1.4:ring===1?-1.0:.7);
    p.tx    = cx + Math.cos(angle) * r;
    p.ty    = cy + Math.sin(angle) * r;
    p.color = magicPal[i % magicPal.length];
    p.r     = .3 + Math.random()*.55;
  });
}

// ════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════
let time = 0;
function renderLoop() {
  requestAnimationFrame(renderLoop);
  time += 0.013;

  ctx.clearRect(0, 0, W(), H());

  updateAmbient(mode);

  if (mode === 'gun') {
    if (GUN.active) applyGunParticles();
  }

  particles.forEach(p => {
    p.update(lerpSpd, mode);
    p.draw();
  });

  if (mode === 'gun' && GUN.active) drawMagicCircle(GUN.x, GUN.y);
}

// ════════════════════════════════════
// MEDIAPIPE HAND DRAWING
// ════════════════════════════════════
const vid  = document.getElementById('vid');
const hc   = document.getElementById('hc');
const hctx = hc.getContext('2d');
hc.width = 148; hc.height = 110;

const HP = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const TIPS_S  = new Set([4,8,12,16,20]);
const BASES_S = new Set([0,1,2,5,9,13,17]);

function drawHand(lms) {
  const cw = hc.width, ch = hc.height;
  const mx2 = x => (1-x)*cw;
  const my2 = y => y*ch;
  hctx.save();
  hctx.shadowBlur = 7; hctx.shadowColor = 'rgba(96,165,250,.7)';
  hctx.strokeStyle = 'rgba(59,130,246,.72)'; hctx.lineWidth = 1.5;
  for (const [a,b] of HP) {
    hctx.beginPath();
    hctx.moveTo(mx2(lms[a].x), my2(lms[a].y));
    hctx.lineTo(mx2(lms[b].x), my2(lms[b].y));
    hctx.stroke();
  }
  hctx.restore();
  for (let i=0;i<lms.length;i++) {
    const px2=mx2(lms[i].x), py2=my2(lms[i].y);
    const r2  = TIPS_S.has(i) ? 3.2 : BASES_S.has(i) ? 1.8 : 2.2;
    const col = TIPS_S.has(i) ? 'rgba(147,197,253,.95)' : BASES_S.has(i) ? 'rgba(37,99,235,.85)' : 'rgba(59,130,246,.75)';
    hctx.save();
    hctx.shadowBlur = TIPS_S.has(i)?10:5;
    hctx.shadowColor = 'rgba(147,197,253,.9)';
    hctx.beginPath(); hctx.arc(px2, py2, r2, 0, Math.PI*2);
    hctx.fillStyle = col; hctx.fill();
    hctx.restore();
  }
}

// ════════════════════════════════════
// GESTURE DETECTION
// ════════════════════════════════════
const isUp   = (tip, mcp) => tip.y < mcp.y - 0.028;
const isDown = (tip, pip) => tip.y > pip.y + 0.018;

function detect(mhl) {
  if (!mhl || !mhl.length) return null;
  const lm = mhl[0];
  const wrist=lm[0];
  const thumbMCP=lm[2], thumbTip=lm[4];
  const iMCP=lm[5],  iPIP=lm[6],  iTip=lm[8];
  const mMCP=lm[9],  mPIP=lm[10], mTip=lm[12];
  const rMCP=lm[13], rPIP=lm[14], rTip=lm[16];
  const pMCP=lm[17], pPIP=lm[18], pTip=lm[20];

  const iU = isUp(iTip,iMCP), mU = isUp(mTip,mMCP);
  const rU = isUp(rTip,rMCP), pU = isUp(pTip,pMCP);
  const iD = isDown(iTip,iPIP), mD = isDown(mTip,mPIP);
  const rD = isDown(rTip,rPIP), pD = isDown(pTip,pPIP);
  const thumbExt = Math.abs(thumbTip.x - thumbMCP.x) > 0.04;
  const ext = [iU,mU,rU,pU].filter(Boolean).length;

  if (iD && mD && rD && pD) return 'fist';

  // THUMBS UP — jempol naik, semua jari lain turun
  const thumbUp = thumbTip.y < lm[2].y - 0.04;   // tip jempol jelas lebih tinggi dari MCP
  if (thumbUp && iD && mD && rD && pD) return 'side';

  if (ext >= 4) return 'open';
  if (iU && !mU && !rU && !pU && !thumbExt) return 'index';
  if (iU && mU && !rU && !pU) {
    const spread = Math.abs(iTip.x - mTip.x);
    return spread > 0.044 ? 'peace' : 'gun';
  }
  return null;
}

let lastG=null, gStart=0, noHandTimer=null;
const G_THRESH = 240;

function onResults(res) {
  hctx.clearRect(0,0,hc.width,hc.height);

  if (res.multiHandLandmarks && res.multiHandLandmarks.length) {
    if (noHandTimer) { clearTimeout(noHandTimer); noHandTimer=null; }
    const lms = res.multiHandLandmarks[0];
    drawHand(lms);

    const det = detect(res.multiHandLandmarks);
    const now = performance.now();

    if (det === 'gun') {
      const mx = ((1-lms[8].x) + (1-lms[12].x)) / 2 * W();
      const my = (lms[8].y + lms[12].y) / 2 * H();
      GUN.x = mx; GUN.y = my; GUN.active = true;
    } else {
      GUN.active = false;
    }

    if (det && det !== lastG) { lastG=det; gStart=now; }
    if (det && det===lastG && now-gStart > G_THRESH) {
      if (det==='gun') setMode('gun', GUN);
      else setMode(det);
      gStart = now - G_THRESH + 500;
    }
    if (!det) lastG=null;
  } else {
    GUN.active = false;
    if (mode !== 'idle' && !noHandTimer) {
      noHandTimer = setTimeout(()=>{ setMode('idle'); noHandTimer=null; }, 1600);
    }
  }
}

// ════════════════════════════════════
// MEDIAPIPE INIT
// ════════════════════════════════════
async function loadMP() {
  return new Promise(ok => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js';
    s1.crossOrigin='anonymous';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
      s2.crossOrigin='anonymous';
      s2.onload = ok;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  });
}

async function startTracking() {
  await loadMP();
  if (typeof Hands === 'undefined') return;
  const hands = new Hands({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f });
  hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:.60, minTrackingConfidence:.50 });
  hands.onResults(onResults);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:320,height:240,facingMode:'user'} });
    vid.srcObject = stream; await vid.play();
    const loop = async () => {
      if (vid.readyState >= 2) await hands.send({ image: vid });
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  } catch(e) { console.warn('Camera denied'); }
}

// ════════════════════════════════════
// RESIZE — clear cache on resize
// ════════════════════════════════════
function onResize() {
  resizeCanvas();
  // Clear ALL shape cache — new screen size needs new sampling canvases
  Object.keys(CACHE).forEach(k => delete CACHE[k]);
  const m = mode; mode = '';
  setMode(m, GUN);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => { setTimeout(onResize, 120); });
screen.orientation && screen.orientation.addEventListener('change', () => { setTimeout(onResize, 120); });

// ════════════════════════════════════
// KEYBOARD  1-6
// ════════════════════════════════════
document.addEventListener('keydown', e => {
  const map = {'1':'open','2':'index','3':'fist','4':'side','5':'peace','6':'gun'};
  if (map[e.key]) {
    mode = '';
    GUN.x = W()/2; GUN.y = H()/2; GUN.active = e.key==='6';
    setMode(map[e.key], GUN);
  }
});

// ════════════════════════════════════
// BOOT
// ════════════════════════════════════
setMode('idle');
renderLoop();
startTracking();
</script>
</body>
